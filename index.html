<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/src/assets/img/icon_2s_round.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Внутренняя CRM-система Мама Доктор для управления клиникой."
    />
    <title>Мама Доктор CRM</title>
    <!--
      Раннее применение темы до загрузки React, чтобы не было белой вспышки
      при обновлении страницы в тёмной теме. Логика и значения должны
      совпадать с src/contexts/color-mode/index.tsx и src/theme.ts.
    -->
    <script>
      (function () {
        try {
          var LIGHT = { slate: "#f1f5f9", gray: "#f4f4f5", neutral: "#f5f5f4" };
          var DARK = {
            navy: "#0f172a",
            mirage: "#18212f",
            mint: "#0d1f1b",
            cinder: "#141319",
            black: "#000000",
          };
          var scheme =
            localStorage.getItem("colorScheme") ||
            localStorage.getItem("colorMode") ||
            "system";
          var mode =
            scheme === "light" || scheme === "dark"
              ? scheme
              : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          var bg;
          if (mode === "dark") {
            bg = DARK[localStorage.getItem("darkSurface")] || DARK.navy;
          } else {
            bg = LIGHT[localStorage.getItem("lightSurface")] || LIGHT.slate;
          }
          var root = document.documentElement;
          root.style.backgroundColor = bg;
          root.style.colorScheme = mode;
        } catch (e) {
          /* localStorage недоступен — оставляем дефолтный фон */
        }
      })();
    </script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Основной entry-поинт приложения -->
    <script type="module" src="/src/index.tsx"></script>
